# Release workflow for scaffold plugins
# Manually triggered from the GitHub Actions UI.
# Calculates the next version from the latest plugin tag, builds,
# creates a git tag, and publishes a GitHub Release.

name: Plugin Release

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin name (e.g. session-transcript)'
        required: true
        type: string
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Build and Release Plugin
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate plugin exists
        run: |
          if [ ! -d "plugins/${{ inputs.plugin }}" ]; then
            echo "Error: Plugin directory plugins/${{ inputs.plugin }} does not exist"
            exit 1
          fi
          if [ ! -f "plugins/${{ inputs.plugin }}/Makefile" ]; then
            echo "Error: Plugin plugins/${{ inputs.plugin }} has no Makefile"
            exit 1
          fi

      - name: Calculate version
        id: version
        run: |
          PLUGIN="${{ inputs.plugin }}"
          TAG_PATTERN="plugin-${PLUGIN}-v*"
          LATEST=$(git describe --tags --abbrev=0 --match "$TAG_PATTERN" 2>/dev/null || echo "")

          if [ -z "$LATEST" ]; then
            MAJOR=0; MINOR=0; PATCH=0
          else
            BASE=$(echo "$LATEST" | sed "s/^plugin-${PLUGIN}-v//")
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
          fi

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          TAG="plugin-${PLUGIN}-v${NEW}"
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build devcontainer image
        uses: docker/build-push-action@v5
        with:
          context: .devcontainer
          load: true
          tags: scaffold-dev:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps/
            build/
          key: deps-${{ hashFiles('mk/config.mk', 'mk/deps.mk') }}
          restore-keys: |
            deps-

      - name: Build plugin
        run: |
          docker run --rm --privileged \
            -v ${{ github.workspace }}:/workspaces/ralph \
            -w /workspaces/ralph \
            -e PATH="/opt/cosmos/bin:$PATH" \
            scaffold-dev:latest \
            bash -c "make -C plugins/${{ inputs.plugin }}"

      - name: Fix permissions
        if: always()
        run: sudo chown -R $(id -u):$(id -g) deps/ build/ out/ 2>/dev/null || true

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "plugin: ${{ inputs.plugin }} v${{ steps.version.outputs.version }}"
          body: "Plugin release: ${{ inputs.plugin }} v${{ steps.version.outputs.version }}"
          files: |
            out/plugins/${{ inputs.plugin }}

      - name: Cleanup tag on failure
        if: failure()
        run: git push origin --delete "${{ steps.version.outputs.tag }}" 2>/dev/null || true
